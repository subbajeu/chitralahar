{# Shared Quill WYSIWYG init — expects #quillEditor, #quillInit, #bodyInput in the page. #}
<script src="{{ url_for('static', filename='vendor/quill/quill.min.js') }}"></script>
<script>
(function () {
  var el = document.getElementById("quillEditor");
  if (!el || !window.Quill) return;
  var UPLOAD = "{{ url_for('admin.inline_upload') }}";

  function imageHandler() {
    var input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = function () {
      var f = input.files && input.files[0];
      if (!f) return;
      var fd = new FormData();
      fd.append("image", f);
      fetch(UPLOAD, { method: "POST", body: fd, credentials: "same-origin" })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (!d.url) return;
          var range = quill.getSelection(true);
          quill.insertEmbed(range.index, "image", d.url, "user");
          quill.setSelection(range.index + 1);
        })
        .catch(function () {});
    };
    input.click();
  }

  var quill = new Quill(el, {
    theme: "snow",
    placeholder: "Write…",
    modules: {
      toolbar: {
        container: [
          [{ header: [2, 3, false] }],
          ["bold", "italic", "underline"],
          [{ list: "ordered" }, { list: "bullet" }],
          ["blockquote", "link", "image"],
          ["clean"],
        ],
        handlers: { image: imageHandler },
      },
    },
  });

  var init = document.getElementById("quillInit");
  if (init && init.innerHTML.trim()) quill.root.innerHTML = init.innerHTML;

  var hidden = document.getElementById("bodyInput");
  el.closest("form").addEventListener("submit", function () {
    hidden.value = quill.root.innerHTML;
  });
})();
</script>

# Alternative: run Chitralahar *inside* Apache with mod_wsgi (no gunicorn).
#   sudo pacman -S mod_wsgi
#   In httpd.conf:  LoadModule wsgi_module modules/mod_wsgi.so
#
# IMPORTANT:
#  - The venv's Python must match the Python mod_wsgi was built for (Arch's
#    system python3). Build the venv with the system python3.
#  - mod_wsgi does NOT copy SetEnv into os.environ, so set SECRET_KEY and
#    CHITRALAHAR_HTTPS=1 (for Secure cookies over TLS) at the top of wsgi.py
#    (os.environ["SECRET_KEY"]="..."; os.environ["CHITRALAHAR_HTTPS"]="1") — or
#    just use gunicorn, which reads env cleanly from the systemd unit.
#  - Reduce version disclosure in httpd.conf: ServerTokens Prod / ServerSignature Off
#  - Keep it to ONE process (threads only) so the one-time DB init can't race.

<VirtualHost *:80>
    ServerName photos.example.com

    WSGIDaemonProcess chitralahar user=http group=http processes=1 threads=5 \
        python-home=/srv/chitralahar/.venv python-path=/srv/chitralahar
    WSGIProcessGroup chitralahar
    WSGIScriptAlias / /srv/chitralahar/wsgi.py process-group=chitralahar

    Alias /static /srv/chitralahar/chitralahar/static
    <Directory /srv/chitralahar/chitralahar/static>
        Require all granted
        Options -Indexes
    </Directory>
    <Directory /srv/chitralahar>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # 0 = no upload-size limit. Set a byte value here to cap request size.
    LimitRequestBody 0

    ErrorLog  /var/log/httpd/chitralahar-error.log
    CustomLog /var/log/httpd/chitralahar-access.log combined
</VirtualHost>

# Chitralahar — Apache reverse proxy to gunicorn (recommended). Arch Linux.
#
# 1) In /etc/httpd/conf/httpd.conf, ensure these are loaded (uncomment them):
#        LoadModule proxy_module          modules/mod_proxy.so
#        LoadModule proxy_http_module     modules/mod_proxy_http.so
#        LoadModule headers_module        modules/mod_headers.so
#    and add at the bottom:
#        Include conf/extra/chitralahar.conf
# 2) Copy this file to /etc/httpd/conf/extra/chitralahar.conf
# 3) sudo systemctl enable --now httpd

<VirtualHost *:80>
    ServerName photos.example.com

    # Serve images + CSS/JS straight from disk (fast); proxy everything else.
    Alias /static /srv/chitralahar/chitralahar/static
    <Directory /srv/chitralahar/chitralahar/static>
        Require all granted
        Options -Indexes
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=2592000"
        </IfModule>
    </Directory>

    ProxyPreserveHost On
    # Tell the app the real client scheme/IP so HTTPS detection (Secure cookie),
    # absolute share links, and rate-limit IPs are correct (needs mod_headers).
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
    ProxyPass        /static !
    ProxyPass        /        http://127.0.0.1:8000/
    ProxyPassReverse /        http://127.0.0.1:8000/

    # 0 = no upload-size limit. Set a byte value here to cap request size.
    LimitRequestBody 0

    ErrorLog  /var/log/httpd/chitralahar-error.log
    CustomLog /var/log/httpd/chitralahar-access.log combined
</VirtualHost>

# HTTPS (strongly recommended — the admin session cookie should never cross
# plain HTTP): install certbot (pacman -S certbot certbot-apache) then run
#   sudo certbot --apache -d photos.example.com
# certbot adds the :443 vhost and the http->https redirect automatically. The
# RequestHeader line above is copied into the :443 vhost, so the app sees https.
# Also set Environment=CHITRALAHAR_HTTPS=1 in deploy/chitralahar.service.
#
# Reduce version disclosure (server scope, in httpd.conf):
#   ServerTokens Prod
#   ServerSignature Off
